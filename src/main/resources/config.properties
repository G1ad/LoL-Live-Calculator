# ============================================================================
# League of Legends Live Calculator — Application Configuration
# ============================================================================
# Place this file in src/main/resources/ (classpath root) so that AppConfig
# loads it automatically at startup. All values shown are the defaults; you
# only need to uncomment and change what you want to override.
# ============================================================================

# ── LoL Live Client API ──────────────────────────────────────────────────
# The host and port where the LoL Live Client Data API listens.
# The default (127.0.0.1:2999) works when the game is running on the same
# machine. Change if you need to proxy through a different address.
lol.api.host=127.0.0.1
lol.api.port=2999
lol.api.livegame.path=/liveclientdata/allgamedata

# ── Remote data sources (Meraki Analytics CDN) ──────────────────────────
# URLs for downloading champion / item data.
data.champions.url=http://cdn.merakianalytics.com/riot/lol/resources/latest/en-US/champions.json
data.items.url=http://cdn.merakianalytics.com/riot/lol/resources/latest/en-US/items.json

# ── Local file storage ───────────────────────────────────────────────────
# Where downloaded data is saved on disk (relative to working directory).
data.local.dir=data
data.local.champions=champions.json
data.local.items=items.json

# ── Polling (Live Game Listener) ─────────────────────────────────────────
# Normal poll interval when the game client is connected.
#poll.interval.ms=1500
# Initial backoff delay on failure (doubles each error up to max).
#poll.backoff.initial.ms=1000
# Maximum backoff delay (prevents unbounded growth).
#poll.backoff.max.ms=30000

# ── Logging ──────────────────────────────────────────────────────────────
# Set to false to suppress verbose per-ability log output.
log.verbose=false
# Set to false to strip ANSI color codes from console output.
#log.ansi=true